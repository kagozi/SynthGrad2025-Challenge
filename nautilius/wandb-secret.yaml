# =============================================================================
# Create the WandB API key as a Kubernetes Secret.
# Run ONCE before submitting any training jobs:
#
#   kubectl apply -f nautilius/wandb-secret.yaml
#
# OR create it directly (recommended — avoids key in YAML):
#
#   kubectl create secret generic wandb-secret \
#       --from-literal=api-key=<YOUR_WANDB_API_KEY>
# =============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: wandb-secret
type: Opaque
stringData:
  # Replace with your actual key (or use kubectl create secret above)
  api-key: "REPLACE_WITH_YOUR_WANDB_API_KEY"
