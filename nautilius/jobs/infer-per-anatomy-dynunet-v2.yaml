# =============================================================================
# Stage-2 Per-Anatomy DynUNet v2 Full 5-Fold Ensemble Inference Job
#
# Uses v2 checkpoints (CT clip fixed to [-1024, 3000] HU).
# Fallback: dynunet_v2 Stage-1 multi-anatomy ensemble.
#
#   kubectl apply -f nautilius/jobs/infer-per-anatomy-dynunet-v2.yaml
#   kubectl logs -f job/synthrad2025-infer-v2-stage2-ensemble
# =============================================================================
apiVersion: batch/v1
kind: Job
metadata:
  name: synthrad2025-infer-v2-stage2-ensemble
spec:
  backoffLimit: 0
  ttlSecondsAfterFinished: 86400
  template:
    spec:
      restartPolicy: Never
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: kubernetes.io/hostname
                operator: NotIn
                values:
                - k8s-chase-ci-10.calit2.optiputer.net
                - k8s-haosu-02.sdsc.optiputer.net
                - k8s-haosu-03.sdsc.optiputer.net
                - nautilus-it-gpu03.fullerton.edu
              - key: nvidia.com/gpu.compute.major
                operator: Gt
                values:
                - "7"
      containers:
        - name: infer
          image: ghcr.io/kagozi/synthrad2025-train:latest
          imagePullPolicy: Always
          command: ["python", "inference/predict_per_anatomy_dynunet.py"]
          args:
            # Stage-2 per-anatomy 5-fold ensemble (v2 checkpoints)
            - "--ckpts_HN"
            - "/pvc/checkpoints/dynunet_v2_HN/fold0_best.pth"
            - "/pvc/checkpoints/dynunet_v2_HN/fold1_best.pth"
            - "/pvc/checkpoints/dynunet_v2_HN/fold2_best.pth"
            - "/pvc/checkpoints/dynunet_v2_HN/fold3_best.pth"
            - "/pvc/checkpoints/dynunet_v2_HN/fold4_best.pth"
            - "--ckpts_TH"
            - "/pvc/checkpoints/dynunet_v2_TH/fold0_best.pth"
            - "/pvc/checkpoints/dynunet_v2_TH/fold1_best.pth"
            - "/pvc/checkpoints/dynunet_v2_TH/fold2_best.pth"
            - "/pvc/checkpoints/dynunet_v2_TH/fold3_best.pth"
            - "/pvc/checkpoints/dynunet_v2_TH/fold4_best.pth"
            - "--ckpts_AB"
            - "/pvc/checkpoints/dynunet_v2_AB/fold0_best.pth"
            - "/pvc/checkpoints/dynunet_v2_AB/fold1_best.pth"
            - "/pvc/checkpoints/dynunet_v2_AB/fold2_best.pth"
            - "/pvc/checkpoints/dynunet_v2_AB/fold3_best.pth"
            - "/pvc/checkpoints/dynunet_v2_AB/fold4_best.pth"
            # Stage-1 v2 multi-anatomy fallback (used if any per-anatomy ckpt is missing)
            - "--fallback"
            - "/pvc/checkpoints/dynunet_v2/fold0_best.pth"
            - "/pvc/checkpoints/dynunet_v2/fold1_best.pth"
            - "/pvc/checkpoints/dynunet_v2/fold2_best.pth"
            - "/pvc/checkpoints/dynunet_v2/fold3_best.pth"
            - "/pvc/checkpoints/dynunet_v2/fold4_best.pth"
            - "--input_dirs"
            - "/pvc/data/synthRAD2025_Task1_Val_Input/Task1"
            - "/pvc/data/synthRAD2025_Task1_Val_Input_D/Task1"
            - "--output_dir"
            - "/pvc/submissions/dynunet_v2_stage2_ensemble"

          env:
            - name: PYTORCH_CUDA_ALLOC_CONF
              value: "expandable_segments:True"

          resources:
            requests:
              memory: "20Gi"
              cpu: "4"
              nvidia.com/gpu: "1"
            limits:
              memory: "24Gi"
              cpu: "4"
              nvidia.com/gpu: "1"

          volumeMounts:
            - name: synthrad2025-vol
              mountPath: /pvc
            - name: dshm
              mountPath: /dev/shm

      volumes:
        - name: synthrad2025-vol
          persistentVolumeClaim:
            claimName: synthrad2025-pvc
        - name: dshm
          emptyDir:
            medium: Memory
            sizeLimit: 16Gi

      tolerations:
        - key: "nvidia.com/gpu"
          operator: "Exists"
          effect: "NoSchedule"
