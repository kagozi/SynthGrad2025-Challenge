# =============================================================================
# Training Job — DDPM Fold 0
#
#   kubectl apply -f nautilius/jobs/train-ddpm-fold0.yaml
#   kubectl logs -f job/synthrad2025-ddpm-fold0
# =============================================================================
apiVersion: batch/v1
kind: Job
metadata:
  name: synthrad2025-ddpm-fold0
spec:
  backoffLimit: 0
  ttlSecondsAfterFinished: 86400
  template:
    spec:
      restartPolicy: Never
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: kubernetes.io/hostname
                operator: NotIn
                values:
                - k8s-chase-ci-10.calit2.optiputer.net
                - k8s-haosu-02.sdsc.optiputer.net
                - k8s-haosu-03.sdsc.optiputer.net
              # A100 80GB required — base_ch=64/batch=16 at 512×512 needs ~40GB+
              - key: nvidia.com/gpu.product
                operator: In
                values:
                - NVIDIA-A100-SXM4-80GB
                - NVIDIA-A100-80GB-PCIe
                - NVIDIA-A100-PCIE-80GB
      containers:
        - name: trainer
          image: ghcr.io/kagozi/synthrad2025-train:latest
          imagePullPolicy: Always
          command: ["python", "training/train_ddpm.py"]
          args:
            - "--config"
            - "training/configs/ddpm.yaml"
            - "--fold"
            - "0"
            # Uncomment to resume:
            # - "--resume"
            # - "/pvc/checkpoints/ddpm/fold0_last.pth"

          env:
            - name: WANDB_API_KEY
              valueFrom:
                secretKeyRef:
                  name: wandb-secret
                  key: api-key
            - name: WANDB_PROJECT
              value: "synthrad2025-task1"
            - name: PYTORCH_ALLOC_CONF
              value: "expandable_segments:True"

          resources:
            requests:
              memory: "48Gi"
              cpu: "8"
              nvidia.com/gpu: "1"
            limits:
              memory: "64Gi"
              cpu: "8"
              nvidia.com/gpu: "1"

          volumeMounts:
            - name: synthrad2025-vol
              mountPath: /pvc
            - name: dshm
              mountPath: /dev/shm

      volumes:
        - name: synthrad2025-vol
          persistentVolumeClaim:
            claimName: synthrad2025-pvc
        - name: dshm
          emptyDir:
            medium: Memory
            sizeLimit: 8Gi

      tolerations:
        - key: "nvidia.com/gpu"
          operator: "Exists"
          effect: "NoSchedule"
