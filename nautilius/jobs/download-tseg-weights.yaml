# =============================================================================
# Download TotalSegmentator v2 weights to PVC
#
# Must run ONCE before the per-anatomy fine-tune jobs (stage 2).
# Saves weights to: /pvc/pretrained/totalsegmentator/nnunet/results/
#
#   kubectl apply -f nautilius/jobs/download-tseg-weights.yaml
#   kubectl logs -f job/synthrad2025-download-tseg
# =============================================================================
apiVersion: batch/v1
kind: Job
metadata:
  name: synthrad2025-download-tseg
spec:
  backoffLimit: 2
  ttlSecondsAfterFinished: 86400
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: downloader
          image: ghcr.io/kagozi/synthrad2025-train:latest
          imagePullPolicy: Always
          command: ["bash", "-c"]
          args:
            - |
              set -e
              echo "Downloading TotalSegmentator weights (task: total, 104 structures)..."
              totalseg_download_weights -t total

              echo "Copying weights to PVC..."
              SRC="${HOME}/.totalsegmentator/nnunet/results"
              DST="/pvc/pretrained/totalsegmentator/nnunet/results"
              mkdir -p "$DST"
              cp -r "$SRC"/. "$DST"/

              echo "Done. Contents of $DST:"
              ls "$DST"

          resources:
            requests:
              memory: "4Gi"
              cpu: "2"
            limits:
              memory: "4Gi"
              cpu: "2"

          volumeMounts:
            - name: synthrad2025-vol
              mountPath: /pvc

      volumes:
        - name: synthrad2025-vol
          persistentVolumeClaim:
            claimName: synthrad2025-pvc
