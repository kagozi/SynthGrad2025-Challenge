# =============================================================================
# Inference + Evaluation Job — Fold 0
#
#   kubectl apply -f nautilius/jobs/infer-fold0.yaml
#   kubectl logs -f job/synthrad2025-infer-fold0
#
# Outputs:
#   Predictions : /pvc/predictions/fold0_val/<case_id>/ct.mha
#   Metrics CSV : /pvc/results/fold0_val_metrics.csv
# =============================================================================
apiVersion: batch/v1
kind: Job
metadata:
  name: synthrad2025-infer-fold0
spec:
  backoffLimit: 0
  ttlSecondsAfterFinished: 86400
  template:
    spec:
      restartPolicy: Never
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: kubernetes.io/hostname
                operator: NotIn
                values:
                - k8s-chase-ci-10.calit2.optiputer.net
                - k8s-haosu-02.sdsc.optiputer.net
                - k8s-haosu-03.sdsc.optiputer.net
              - key: nvidia.com/gpu.compute.major
                operator: Gt
                values:
                - "7"       # requires sm_80+ (Ampere+): excludes V100 sm_70, GTX 1080 Ti sm_61
      containers:
        - name: infer
          image: ghcr.io/kagozi/synthrad2025-train:latest
          imagePullPolicy: Always
          command: ["/bin/bash", "-c"]
          args:
            - |
              set -e
              # Fix: PyTorch 2.6 changed weights_only default to True; patch load calls in-place
              sed -i 's/torch.load(checkpoint_path, map_location=device)/torch.load(checkpoint_path, map_location=device, weights_only=False)/g' /app/inference/predict.py
              sed -i 's/num_workers=2/num_workers=0/g' /app/inference/predict.py
              python -c "
import re, pathlib
f = pathlib.Path('/app/inference/evaluate.py')
txt = f.read_text()
txt = re.sub(r'gt_dir / anatomy\.replace\(.*?\) / case_id', 'gt_dir / anatomy / case_id', txt)
f.write_text(txt)
"
              echo "=== Fold 0: Predict (main) ===" && \
              python inference/predict.py \
                --checkpoint /pvc/checkpoints/baseline_unet2d/fold0_best.pth \
                --input_dir  /pvc/data/synthRAD2025_Task1_Train/Task1 \
                --output_dir /pvc/predictions/fold0_val \
                --split val \
                --folds_csv  /pvc/data/splits/folds.csv \
                --fold 0 \
                --batch_size 16 && \
              echo "=== Fold 0: Predict (center D) ===" && \
              python inference/predict.py \
                --checkpoint /pvc/checkpoints/baseline_unet2d/fold0_best.pth \
                --input_dir  /pvc/data/synthRAD2025_Task1_Train_D/Task1 \
                --output_dir /pvc/predictions/fold0_val \
                --split val \
                --folds_csv  /pvc/data/splits/folds.csv \
                --fold 0 \
                --batch_size 16 && \
              echo "=== Fold 0: Evaluate ===" && \
              python inference/evaluate.py \
                --pred_dir /pvc/predictions/fold0_val \
                --gt_dir   /pvc/data/synthRAD2025_Task1_Train/Task1 \
                --output   /pvc/results/fold0_val_metrics.csv \
                --compute_seg \
                --verbose
          resources:
            requests:
              memory: "16Gi"
              cpu: "4"
              nvidia.com/gpu: "1"
            limits:
              memory: "24Gi"
              cpu: "4"
              nvidia.com/gpu: "1"
          volumeMounts:
            - name: synthrad2025-vol
              mountPath: /pvc
            - name: dshm
              mountPath: /dev/shm
      volumes:
        - name: synthrad2025-vol
          persistentVolumeClaim:
            claimName: synthrad2025-pvc
        - name: dshm
          emptyDir:
            medium: Memory
            sizeLimit: 4Gi
      tolerations:
        - key: "nvidia.com/gpu"
          operator: "Exists"
          effect: "NoSchedule"
