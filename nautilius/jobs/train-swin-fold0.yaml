# =============================================================================
# Swin-UNETR Training Job — Fold 0
#
#   kubectl apply -f nautilius/jobs/train-swin-fold0.yaml
#   kubectl logs -f job/synthrad2025-train-swin-fold0
# =============================================================================
apiVersion: batch/v1
kind: Job
metadata:
  name: synthrad2025-train-swin-fold0
spec:
  backoffLimit: 0
  ttlSecondsAfterFinished: 86400
  template:
    spec:
      restartPolicy: Never
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: kubernetes.io/hostname
                operator: NotIn
                values:
                - k8s-chase-ci-10.calit2.optiputer.net
                - k8s-haosu-02.sdsc.optiputer.net
                - k8s-haosu-03.sdsc.optiputer.net
              # Require Ampere or newer (compute capability > 8) for bf16/tf32 gains
              - key: nvidia.com/gpu.compute.major
                operator: Gt
                values:
                - "7"
      containers:
        - name: trainer
          image: ghcr.io/kagozi/synthrad2025-train:latest
          imagePullPolicy: Always
          command: ["python", "training/train_swin.py"]
          args:
            - "--config"
            - "training/configs/swin_unetr.yaml"
            - "--fold"
            - "0"
            # Uncomment to resume:
            # - "--resume"
            # - "/pvc/checkpoints/swin_unetr/fold0_last.pth"

          env:
            - name: WANDB_API_KEY
              valueFrom:
                secretKeyRef:
                  name: wandb-secret
                  key: api-key
            - name: WANDB_PROJECT
              value: "synthrad2025-task1"
            - name: PYTORCH_CUDA_ALLOC_CONF
              value: "expandable_segments:True"
            # MONAI uses nibabel/h5py for some ops — avoid OOM warnings
            - name: MONAI_DATA_DIRECTORY
              value: "/pvc/pretrained"

          resources:
            requests:
              memory: "28Gi"
              cpu: "4"
              nvidia.com/gpu: "1"
            limits:
              memory: "48Gi"
              cpu: "8"
              nvidia.com/gpu: "1"

          volumeMounts:
            - name: synthrad2025-vol
              mountPath: /pvc
            - name: dshm
              mountPath: /dev/shm

      volumes:
        - name: synthrad2025-vol
          persistentVolumeClaim:
            claimName: synthrad2025-pvc
        - name: dshm
          emptyDir:
            medium: Memory
            sizeLimit: 16Gi

      tolerations:
        - key: "nvidia.com/gpu"
          operator: "Exists"
          effect: "NoSchedule"
