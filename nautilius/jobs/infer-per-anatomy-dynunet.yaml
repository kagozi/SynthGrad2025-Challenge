# =============================================================================
# Per-Anatomy DynUNet Inference Job
#
# Routes each patient to its anatomy-specific checkpoint.
# Missing per-anatomy checkpoints fall back to the multi-anatomy fold0 model.
#
#   kubectl apply -f nautilius/jobs/infer-per-anatomy-dynunet.yaml
#   kubectl logs -f job/synthrad2025-infer-per-anatomy
# =============================================================================
apiVersion: batch/v1
kind: Job
metadata:
  name: synthrad2025-infer-per-anatomy
spec:
  backoffLimit: 0
  ttlSecondsAfterFinished: 86400
  template:
    spec:
      restartPolicy: Never
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: kubernetes.io/hostname
                operator: NotIn
                values:
                - k8s-chase-ci-10.calit2.optiputer.net
                - k8s-haosu-02.sdsc.optiputer.net
                - k8s-haosu-03.sdsc.optiputer.net
              - key: nvidia.com/gpu.compute.major
                operator: Gt
                values:
                - "7"
      containers:
        - name: infer
          image: ghcr.io/kagozi/synthrad2025-train:latest
          imagePullPolicy: Always
          command: ["python", "inference/predict_per_anatomy_dynunet.py"]
          args:
            # Per-anatomy checkpoints (comment out any not yet trained)
            - "--ckpt_HN"
            - "/pvc/checkpoints/dynunet_HN/fold0_best.pth"
            - "--ckpt_TH"
            - "/pvc/checkpoints/dynunet_TH/fold0_best.pth"
            - "--ckpt_AB"
            - "/pvc/checkpoints/dynunet_AB/fold0_best.pth"
            # Fallback used for any anatomy without a per-anatomy checkpoint:
            - "--fallback"
            - "/pvc/checkpoints/dynunet/fold0_best.pth"
            - "--input_dirs"
            - "/pvc/data/synthRAD2025_Task1_Val_Input/Task1"
            - "/pvc/data/synthRAD2025_Task1_Val_Input_D/Task1"
            - "--output_dir"
            - "/pvc/submissions/dynunet_per_anatomy"

          env:
            - name: PYTORCH_CUDA_ALLOC_CONF
              value: "expandable_segments:True"

          resources:
            requests:
              memory: "28Gi"
              cpu: "4"
              nvidia.com/gpu: "1"
            limits:
              memory: "36Gi"
              cpu: "6"
              nvidia.com/gpu: "1"

          volumeMounts:
            - name: synthrad2025-vol
              mountPath: /pvc
            - name: dshm
              mountPath: /dev/shm

      volumes:
        - name: synthrad2025-vol
          persistentVolumeClaim:
            claimName: synthrad2025-pvc
        - name: dshm
          emptyDir:
            medium: Memory
            sizeLimit: 16Gi

      tolerations:
        - key: "nvidia.com/gpu"
          operator: "Exists"
          effect: "NoSchedule"
