# ============================================================
# SynthRAD2025 Task 1 — Round 2: Improved Loss
#
# Changes vs baseline_unet2d.yaml:
#   - GDL enabled (w_gdl: 0.5)  → sharper bone/soft-tissue edges
#   - Bone-weighted MAE (2.5×)  → directly targets HD95 / bone dice
#   - batch_size: 32            → safe with AMP on 16GB+
#   - num_workers: 8
# ============================================================

experiment:
  name: "round2_unet2d"
  fold: 0
  seed: 42

# ── Data ────────────────────────────────────────────────────
data:
  data_dirs:
    - "/pvc/data/synthRAD2025_Task1_Train/Task1"
    - "/pvc/data/synthRAD2025_Task1_Train_D/Task1"

  folds_csv:  "/pvc/data/splits/folds.csv"
  slice_axis: 0
  pad_to: [512, 512]
  skip_empty_slices: true
  empty_threshold: 0.01
  num_workers: 8
  pin_memory: true

# ── Model ───────────────────────────────────────────────────
model:
  name: "attention_unet2d"
  in_channels: 1
  out_channels: 1
  base_features: 64
  depth: 4
  use_anatomy: true
  n_anatomy: 3

# ── Loss ────────────────────────────────────────────────────
loss:
  w_mae:  1.0
  w_ssim: 1.0
  w_gdl:  0.5            # gradient difference loss — sharpens bone boundaries
  ms_ssim_levels: 5
  bone_weight:    2.5    # 2.5× weight on voxels where HU > 200 (bone)
  bone_threshold: -0.4   # normalised [-1,1] equivalent of HU 200

# ── Training ────────────────────────────────────────────────
training:
  epochs: 100
  batch_size: 8          # AttentionUNet2D at 512x512 needs 8; attention gates add extra activation tensors
  val_every_n_epochs: 5
  save_every_n_epochs: 10

# ── Optimiser ───────────────────────────────────────────────
optimizer:
  name: "adamw"
  lr: 1.0e-4
  weight_decay: 1.0e-5
  betas: [0.9, 0.999]

# ── Scheduler ───────────────────────────────────────────────
scheduler:
  name: "cosine"
  T_max: 100
  eta_min: 1.0e-6

# ── Output ──────────────────────────────────────────────────
output:
  checkpoint_dir: "/pvc/checkpoints/round2_unet2d"
  save_best: true
