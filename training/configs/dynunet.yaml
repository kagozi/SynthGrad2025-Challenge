# ============================================================
# SynthRAD2025 Task 1 — DynUNet Stage 1: Multi-Anatomy Base
#
# Two-stage workflow:
#   Stage 1 (this config): 400 epochs on ALL anatomies.
#                          Loss: MAE + MS-SSIM (no AFP).
#                          Produces fold0_best.pth … fold4_best.pth.
#   Stage 2 (dynunet_HN/TH/AB.yaml): 800 epochs per-anatomy fine-tune
#                          with TotalSegmentator AFP loss added.
#
# Optimiser: SGD + polynomial LR decay (nnU-Net defaults).
# Architecture: DynUNETR3D with residual blocks + FiLM anatomy conditioning.
# CT clip: [-1024, 1500] HU (narrowed from [-1000, 3000]).
# ============================================================

experiment:
  name: "dynunet"
  fold: 0
  seed: 42

# ── Data ────────────────────────────────────────────────────
data:
  data_dirs:
    - "/pvc/data/synthRAD2025_Task1_Train/Task1"
    - "/pvc/data/synthRAD2025_Task1_Train_D/Task1"

  folds_csv: "/pvc/data/splits/folds.csv"

  patch_size:          [64, 160, 160]
  samples_per_volume:  8

  augment: true
  num_workers: 8
  pin_memory: true

# ── Model ───────────────────────────────────────────────────
model:
  name:             "dynunet"
  in_channels:      1
  n_anatomy:        3
  use_anatomy:      true
  film_hidden:      128
  deep_supervision: true
  deep_supr_num:    2
  res_block:        true
  filters:          null
  dropout:          0.0

# ── Loss ────────────────────────────────────────────────────
loss:
  w_mae:          1.0
  w_ssim:         0.5            # MS-SSIM is an evaluation metric — train toward it
  w_gdl:          0.0            # removed — top teams don't use it
  w_perc:         0.0            # AFP added in Stage 2 per-anatomy fine-tune
  bone_weight:    2.5
  bone_threshold: 0.0            # HU≈200 in [-1024,1500] space ≈ 0.0 normalised
  perc_max_slices: 16
  aux_weights:    [0.5, 0.25]

# ── Training ────────────────────────────────────────────────
training:
  epochs:               400
  batch_size:           2
  val_every_n_epochs:   20
  save_every_n_epochs:  50

# ── Optimiser (nnU-Net defaults) ────────────────────────────
optimizer:
  name:         "sgd"
  lr:           0.01
  momentum:     0.99
  nesterov:     true
  weight_decay: 3.0e-5

# ── Scheduler ───────────────────────────────────────────────
scheduler:
  name:  "poly"
  T_max: 400         # must match training.epochs

# ── Sliding window inference ─────────────────────────────────
inference:
  roi_size:      [64, 160, 160]
  sw_batch_size: 4
  overlap:       0.5
  mode:          "gaussian"

# ── Output ──────────────────────────────────────────────────
output:
  checkpoint_dir: "/pvc/checkpoints/dynunet"
  save_best:      true
