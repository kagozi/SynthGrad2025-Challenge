# ============================================================
# SynthRAD2025 Task 1 — DynUNet Stage 2: Head & Neck
#
# Two-stage workflow:
#   Stage 1: train on all anatomies  (dynunet.yaml, 400 ep)
#   Stage 2: fine-tune per anatomy   (this config, --finetune_from <stage1_best>)
#
# Loss: MAE + MS-SSIM + TotalSegmentator AFP (CT-domain features).
# CT clip: [-1024, 1500] HU.
# ============================================================

experiment:
  name: "dynunet_HN"
  fold: 0
  seed: 42

# ── Data ────────────────────────────────────────────────────
data:
  data_dirs:
    - "/pvc/data/synthRAD2025_Task1_Train/Task1"
    - "/pvc/data/synthRAD2025_Task1_Train_D/Task1"

  folds_csv:       "/pvc/data/splits/folds.csv"
  anatomy_filter:  "HN"

  patch_size:          [64, 160, 160]
  samples_per_volume:  8

  augment: true
  num_workers: 4
  pin_memory: false

# ── Model ───────────────────────────────────────────────────
model:
  name:             "dynunet"
  in_channels:      1
  n_anatomy:        3
  use_anatomy:      true
  film_hidden:      128
  deep_supervision: true
  deep_supr_num:    2
  res_block:        true
  filters:          null
  dropout:          0.0

# ── Loss ────────────────────────────────────────────────────
loss:
  w_mae:           1.0
  w_ssim:          0.5
  w_gdl:           0.0
  w_perc:          0.3            # increased from 0.1
  afp_type:        "totalseg"
  afp_weights_dir: "/pvc/pretrained/totalsegmentator/nnunet/results"
  bone_weight:     2.5
  bone_threshold:  0.0            # HU≈200 in [-1024,1500] space
  perc_max_slices: 16
  aux_weights:     [0.5, 0.25]

# ── Training ────────────────────────────────────────────────
# 500 epochs × 250 steps = 125K gradient updates — enough for fine-tuning from
# Stage-1 weights; run in parallel with TH/AB jobs to stay within 12h wall time.
training:
  epochs:               500
  steps_per_epoch:      250
  batch_size:           2
  val_every_n_epochs:   50
  save_every_n_epochs:  100

# ── Optimiser (nnU-Net defaults) ────────────────────────────
optimizer:
  name:         "sgd"
  lr:           0.01
  momentum:     0.99
  nesterov:     true
  weight_decay: 3.0e-5

# ── Scheduler ───────────────────────────────────────────────
scheduler:
  name:  "poly"
  T_max: 500

# ── Sliding window inference ─────────────────────────────────
inference:
  roi_size:      [64, 160, 160]
  sw_batch_size: 6
  overlap:       0.5
  mode:          "gaussian"

# ── Output ──────────────────────────────────────────────────
output:
  checkpoint_dir: "/pvc/checkpoints/dynunet_HN"
  save_best:      true
