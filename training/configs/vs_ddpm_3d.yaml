experiment:
  name: "vs_ddpm_3d"
  fold: 0
  seed: 42

data:
  data_dirs:
    - "/pvc/data/synthRAD2025_Task1_Train/Task1"
    - "/pvc/data/synthRAD2025_Task1_Train_D/Task1"
  folds_csv: "/pvc/data/splits/folds.csv"
  patch_size: [32, 128, 128]
  samples_per_volume: 8
  num_workers: 4
  pin_memory: false

model:
  name: "vs_ddpm_3d"
  in_channels: 2
  out_channels: 2
  base_ch: 32
  time_emb_dim: 256
  n_anatomy: 3
  dropout: 0.0

diffusion:
  T: 1000
  s: 0.008
  lambda_vlb: 0.001
  lambda_mae: 1.0
  lambda_ssim: 1.0

training:
  epochs: 200
  batch_size: 2
  val_every_n_epochs: 5
  save_every_n_epochs: 20
  val_ddim_steps: 10
  infer_ddim_steps: 20
  n_val_cases: 5

optimizer:
  name: "adamw"
  lr: 1.0e-4
  weight_decay: 1.0e-5
  betas: [0.9, 0.999]

scheduler:
  name: "cosine"
  T_max: 200
  eta_min: 1.0e-6

output:
  checkpoint_dir: "/pvc/checkpoints/vs_ddpm_3d"
  save_best: true
